name: Create and publish a Docker image

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building release version ${VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/lightning-pub:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/lightning-pub:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Capture image digest
        id: capture-digest
        run: |
          DIGEST="${{ steps.build-and-push.outputs.digest }}"
          echo "Multi-arch manifest digest: $DIGEST"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-digest: ${{ steps.capture-digest.outputs.digest }}
          subject-name: ghcr.io/${{ github.repository_owner }}/lightning-pub
          push-to-registry: true

      - name: Trigger StartOS package build
        env:
          STARTOS_BUILD_TRIGGER: ${{ secrets.STARTOS_BUILD_TRIGGER }}
          VERSION: ${{ steps.version.outputs.version }}
          DIGEST: ${{ steps.capture-digest.outputs.digest }}
          COMMIT: ${{ github.sha }}
          RELEASE_NOTES: ${{ github.event.release.body }}
        run: |
          if [ -z "$STARTOS_BUILD_TRIGGER" ]; then
            echo "STARTOS_BUILD_TRIGGER not configured, skipping StartOS build trigger"
            exit 0
          fi

          PAYLOAD=$(python3 - <<'PY'
          import json, os
          print(json.dumps({
              "event_type": "docker-image-updated",
              "client_payload": {
                  "version": os.environ["VERSION"],
                  "docker_tag": os.environ["VERSION"],
                  "digest": os.environ["DIGEST"],
                  "commit": os.environ["COMMIT"],
                  "changelog": os.environ.get("RELEASE_NOTES", ""),
              },
          }))
          PY
          )

          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${STARTOS_BUILD_TRIGGER}" \
            https://api.github.com/repos/shocknet/start9-LightningPub/dispatches \
            -d "$PAYLOAD"

          echo "StartOS build triggered for v${VERSION}"
