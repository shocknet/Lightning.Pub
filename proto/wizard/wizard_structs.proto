syntax = "proto3";

package wizard_structs;

option go_package = "github.com/shocknet/lightning.pub";

message Empty {}

message StateResponse {
    bool config_sent = 1;
    bool admin_linked = 2;
}
message ConfigRequest {
    string source_name = 1;
    string relay_url = 2;
    bool automate_liquidity = 3;
    bool push_backups_to_nostr = 4;
    string avatar_url = 5;
}
message AdminConnectInfoResponse {
    string nprofile = 1;
    oneof connect_info {
        string admin_token = 2;
        string enrolled_npub = 3;
    }
}
enum LndState {
    OFFLINE = 0;
    SYNCING = 1;
    ONLINE = 2;
}
message ServiceStateResponse {
    string provider_name = 1;
    repeated string relays = 2;
    string admin_npub = 3;
    bool relay_connected = 4;
    LndState lnd_state = 5;
    bool watchdog_ok = 6;
    string http_url = 7;
    string nprofile = 8;
    string source_name = 9;
    string relay_url = 10;
    bool automate_liquidity = 11;
    bool push_backups_to_nostr = 12;
    string avatar_url = 13;
    string app_id = 14;
}

// BACKUP CHANGE: Restore request/response messages.
// NOTE: The /wizard/restore endpoint is currently wired as a direct Express route
// (not via codegen). These definitions serve as the contract for future codegen.
// Run: npx protoc -I ./wizard --pub_out=./wizard_service wizard/*
message RestoreRequest {
    string phrase = 1;
    string source = 2;         // "cloud" | "ftp" | "local"
    string sftp_host = 3;      // required if source=ftp
    string sftp_user = 4;      // optional — derived from phrase if empty
    string sftp_pass = 5;      // optional — derived from phrase if empty
    string local_path = 6;     // required if source=local
    string relay = 7;          // optional — overrides NOSTR_RELAYS for SCB fetch
}

message RestoreResponse {
    bool success = 1;
    string error = 2;
    int32 tables_restored = 3;
}